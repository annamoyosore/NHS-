<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Biodata Form</title>

<style>
/* 🌫️ Full page fit */
body {
margin:0;
font-family: Arial, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
padding:15px;
box-sizing:border-box;
}

/* ✨ background glow */
body::before {
content:"";
position:fixed;
inset:0;
background: radial-gradient(circle at top left, #e6f7ff, transparent 60%),
            radial-gradient(circle at bottom right, #e6f0ff, transparent 60%);
z-index:-1;
}

/* 📦 Form container */
form {
width:100%;
max-width:480px;
background: linear-gradient(135deg, #87ceeb, #b0e0ff);
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
box-sizing:border-box;
}

/* 💪 BOLD TITLE */
h2 {
text-align:center;
margin-bottom:15px;
color:#003366;
font-weight:900;
}

/* 🏷️ Labels (BOLD) */
label {
font-size:13px;
font-weight:900;
color:#003366;
margin-top:8px;
display:block;
}

/* ✍️ Inputs */
input, select {
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:2px solid #cce6ff;
border-radius:8px;
outline:none;
background:#f8fcff;
font-weight:600;
box-sizing:border-box;
}

/* 🔵 focus */
input:focus {
border-color:#3399ff;
box-shadow:0 0 6px rgba(51,153,255,0.5);
}

/* 🔘 button */
button {
width:100%;
padding:12px;
background:#007acc;
border:none;
color:#fff;
font-size:16px;
font-weight:900;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover {
background:#005fa3;
transform: scale(1.02);
}

/* 📝 note */
.note {
font-size:12px;
text-align:center;
color:#003366;
margin-top:10px;
font-weight:600;
}
</style>
</head>

<body>

<form id="bioForm">
<h2>Biodata Submission</h2>

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

<label>Home Address</label>
<input type="text" id="address" placeholder="Enter your home address" required>

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Phone Number [WhatsApp enabled]</label>
<input type="tel" id="phone" placeholder="Enter your phone number" required>

<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email address" required>

<label>Occupation</label>
<input type="text" id="occupation" placeholder="Enter your occupation">

<label>Monthly Income</label>
<input type="text" id="income" placeholder="Enter your monthly income">

<label>Funding Package</label>
<select id="package">
<option>Youth Empowerment</option>
<option>Educational Support</option>
<option>Personal Relief Fund</option>
<option>Agriculture</option>
<option>Business Development Funds</option>
</select>

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Housing Status</label>
<select id="housing">
<option>Own House</option>
<option>Rent Apartment</option>
</select>

<button type="submit">Submit</button>

<p class="note">We will Contact you via WhatsApp or Email and check your mail or whatsapp after 30 minutes for the  Next steps</p>
</form>

<script>
<script src="script.js"></script>

</body>
</html>
