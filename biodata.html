<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Biodata Form</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
padding:15px;
}

form {
width:100%;
max-width:480px;
background: linear-gradient(135deg, #87ceeb, #b0e0ff);
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2 {
text-align:center;
color:#003366;
font-weight:900;
}

label {
font-size:13px;
font-weight:900;
color:#003366;
display:block;
margin-top:8px;
}

input, select {
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:2px solid #cce6ff;
border-radius:8px;
}

button {
width:100%;
padding:12px;
background:#007acc;
color:white;
border:none;
border-radius:8px;
font-weight:900;
cursor:pointer;
}

.note {
font-size:12px;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<form id="bioForm">
<h2>Biodata Submission</h2>

<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="address" placeholder="Home Address" required>
<input type="date" id="dob" required>
<input type="tel" id="phone" placeholder="Phone" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="occupation" placeholder="Occupation">
<input type="text" id="income" placeholder="Income">

<select id="package">
<option>Youth Empowerment</option>
<option>Educational Support</option>
<option>Personal Relief Fund</option>
<option>Agriculture</option>
<option>Business Development Funds</option>
</select>

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<select id="housing">
<option>Own House</option>
<option>Rent Apartment</option>
</select>

<button type="submit">Submit</button>

<p class="note">Check WhatsApp or email after submission</p>
</form>

<!-- ✅ FIXED (only one script tag) -->
<script src="script.js"></script>

</body>
</html>
